version: '3.8'

services:
  wizard:
    build: .
    image: elko-project-wizard:latest
    ports:
      - "8080:8080"
    volumes:
      - wizard-data:/app/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/directives"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  wizard-data:
